# NutriVision — Default Training Configuration
# =============================================

# Dataset
dataset:
  name: food-101
  data_dir: ./data
  img_size: 224
  batch_size: 32
  num_workers: 2
  val_split: 0.1

# Model
model:
  name: resnet50           # resnet50 or mobilenetv3
  num_classes: 101
  dropout: 0.3
  pretrained: true

# Training — Phase 1 (frozen backbone)
phase1:
  epochs: 5
  lr: 1.0e-3
  optimizer: adam

# Training — Phase 2 (full fine-tuning)
phase2:
  epochs: 15
  backbone_lr: 1.0e-5
  head_lr: 1.0e-4
  optimizer: adam
  scheduler: reduce_on_plateau
  scheduler_factor: 0.5
  scheduler_patience: 2
  early_stopping_patience: 5

# Augmentation
augmentation:
  random_resized_crop_scale: [0.8, 1.0]
  horizontal_flip: true
  rotation_degrees: 15
  color_jitter:
    brightness: 0.2
    contrast: 0.2
    saturation: 0.2

# Evaluation
evaluation:
  top_k: [1, 5]
  save_confusion_matrix: true
  save_classification_report: true
  num_confused_pairs: 20

# Paths
paths:
  model_save_dir: ./models
  results_dir: ./results
  figures_dir: ./results/figures
  metrics_dir: ./results/metrics
